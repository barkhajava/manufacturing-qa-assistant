<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manufacturing QA Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 720px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    header {
      padding: 18px 24px;
      background: #1a1a2e;
      color: #fff;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.01em; }
    header p  { font-size: 0.8rem; color: #a0a0b8; margin-top: 2px; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.9rem;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .message.user {
      align-self: flex-end;
      background: #1a1a2e;
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #f0f2f5;
      color: #1a1a2e;
      border-bottom-left-radius: 3px;
    }

    .message.thinking {
      align-self: flex-start;
      background: #f0f2f5;
      color: #999;
      font-style: italic;
      font-size: 0.85rem;
    }

    .suggestions {
      padding: 0 24px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .suggestion-btn {
      background: none;
      border: 1px solid #d0d0e0;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.8rem;
      color: #555;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .suggestion-btn:hover {
      background: #1a1a2e;
      color: #fff;
      border-color: #1a1a2e;
    }

    form {
      display: flex;
      gap: 10px;
      padding: 16px 24px;
      border-top: 1px solid #eee;
    }

    input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #1a1a2e; }

    button[type="submit"] {
      padding: 10px 20px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button[type="submit"]:disabled { opacity: 0.45; cursor: not-allowed; }

    #back-btn {
      display: none;
      align-items: center;
      gap: 6px;
      margin: 12px 24px 0;
      padding: 6px 14px;
      background: none;
      border: 1px solid #d0d0e0;
      border-radius: 20px;
      font-size: 0.8rem;
      color: #555;
      cursor: pointer;
      width: fit-content;
      transition: background 0.15s, color 0.15s;
    }

    #back-btn:hover {
      background: #1a1a2e;
      color: #fff;
      border-color: #1a1a2e;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Manufacturing QA Assistant</h1>
    <p>Ask questions about production line defects in plain English</p>
  </header>

  <button id="back-btn">&#8592; Back to suggestions</button>

  <div id="messages"></div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion-btn">Which lines are active?</button>
    <button class="suggestion-btn">How is Line B trending over the last 4 weeks?</button>
    <button class="suggestion-btn">What was Line C's defect rate last month?</button>
    <button class="suggestion-btn">Which line had the most defects this week?</button>
  </div>

  <form id="chat-form">
    <input id="input" type="text" aria-label="Ask a question" placeholder="Ask about production quality…" autocomplete="off" />
    <button type="submit" id="send-btn">Send</button>
  </form>
</div>

<script>
  const messagesEl  = document.getElementById('messages');
  const form        = document.getElementById('chat-form');
  const input       = document.getElementById('input');
  const sendBtn     = document.getElementById('send-btn');
  const suggestions = document.getElementById('suggestions');
  const backBtn     = document.getElementById('back-btn');

  const history = [];

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showSuggestions() {
    messagesEl.innerHTML = '';
    history.length = 0;
    suggestions.style.display = 'flex';
    backBtn.style.display = 'none';
    input.focus();
  }

  async function sendMessage(question) {
    if (!question.trim()) return;

    suggestions.style.display = 'none';
    backBtn.style.display = 'flex';
    addMessage('user', question);
    history.push({ role: 'user', content: question });

    input.value = '';
    sendBtn.disabled = true;

    const thinking = addMessage('thinking', 'Thinking…');

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, history: history.slice(0, -1) }),
      });
      const data = await res.json();
      thinking.remove();
      addMessage('assistant', data.answer);
      history.push({ role: 'assistant', content: data.answer });
    } catch (err) {
      thinking.remove();
      addMessage('assistant', 'Something went wrong. Please try again.');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  form.addEventListener('submit', e => {
    e.preventDefault();
    sendMessage(input.value);
  });

  backBtn.addEventListener('click', showSuggestions);

  document.querySelectorAll('.suggestion-btn').forEach(btn => {
    btn.addEventListener('click', () => sendMessage(btn.textContent));
  });
</script>
</body>
</html>
